<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#26d0ce">
  <title>Tintenfisch-Lesen: Lucs Lesespiel</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #0f1b47; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #game {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
    }
  </style>
</head>
<body>
  <div id="game"></div>

  <script src="js/words.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/scenes/BootScene.js"></script>
  <script src="js/scenes/MenuScene.js"></script>
  <script src="js/scenes/QuizScene.js"></script>
  <script src="js/scenes/ShooterScene.js"></script>
  <script src="js/scenes/LevelCompleteScene.js"></script>
  <script src="js/scenes/TrophyScene.js"></script>
  <script src="js/main.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      // Clear old caches and re-register
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.update());
      });
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
